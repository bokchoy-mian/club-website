# GitHub Pages 静态网站部署工作流
# 触发条件：推送到 main 分支时自动部署，或手动触发
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]  # 当代码推送到 main 分支时触发
  workflow_dispatch:  # 支持手动在 GitHub Actions 页面触发部署

# 权限配置：设置 GitHub Pages 所需的访问权限
permissions:
  contents: read      # 读取仓库内容
  pages: write       # 写入 GitHub Pages
  id-token: write    # 用于 OIDC 身份验证

# 并发控制：确保同一时间只有一个部署任务运行，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: false  # 新部署会等待当前部署完成，而不是取消它

jobs:
  # 构建作业：在 ubuntu-latest 环境构建静态网站
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout  # 检出仓库代码
        uses: actions/checkout@v4

      - name: Setup Node  # 配置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'  # 启用 npm 缓存加速依赖安装

      - name: Install dependencies  # 安装项目依赖
        run: npm ci  # 使用 npm ci 比 npm install 更适合 CI 环境（更快、更稳定）

      - name: Build  # 构建生产版本
        run: npm run build

      - name: Upload artifact  # 上传构建产物到 GitHub
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # 指定构建输出目录

  # 部署作业：将构建产物部署到 GitHub Pages
  deploy:
    needs: build  # 必须等待 build 作业完成
    runs-on: ubuntu-latest
    environment:
      name: github-pages  # 关联 GitHub Pages 环境
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages  # 执行部署
        id: deployment
        uses: actions/deploy-pages@v5
